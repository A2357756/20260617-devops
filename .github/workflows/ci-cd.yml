name: FastAPI VM CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-lint:
    name: Code Linting & Syntax Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-state-active: true
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Syntax & Lint Check
      run: |
        # Verify python syntax for all files in app directory
        python -m compileall app/

  build-verification:
    name: Build Verification (Docker)
    runs-on: ubuntu-latest
    needs: test-and-lint

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Verifies that the Dockerfile builds successfully with no compilation errors
    - name: Build Docker Image (Dry Run)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false # Dry-run check only
        tags: fastapi-nginx-demo:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

  trigger-vm-deploy:
    name: Trigger VM Deployment
    runs-on: ubuntu-latest
    needs: build-verification
    # Only runs if they have configured the VM connection secrets in GitHub Secrets
    # This prevents the workflow from failing if secrets are not set up yet.
    if: "${{ secrets.VM_IP != '' && secrets.VM_WEBHOOK_SECRET != '' }}"

    steps:
    - name: Send Webhook to VM
      run: |
        SECRET="${{ secrets.VM_WEBHOOK_SECRET }}"
        PAYLOAD='{"ref": "${{ github.ref }}", "repository": {"name": "${{ github.event.repository.name }}"}}'
        
        # Calculate HMAC SHA-256 signature using Python
        SIGNATURE=$(python3 -c "import hmac, hashlib; print('sha256=' + hmac.new(b'$SECRET', b'$PAYLOAD', hashlib.sha256).hexdigest())")
        
        # Send authenticated curl POST request to the VM
        curl -X POST \
          -H "Content-Type: application/json" \
          -H "X-GitHub-Event: push" \
          -H "X-Hub-Signature-256: $SIGNATURE" \
          -d "$PAYLOAD" \
          http://${{ secrets.VM_IP }}/webhook/github
