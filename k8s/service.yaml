apiVersion: v1
kind: Service
metadata:
  name: fastapi-nginx-service
  namespace: default
  labels:
    app: fastapi-nginx-demo
spec:
  type: LoadBalancer # Provisions an external IP in GCP/GKE
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: fastapi-nginx-demo
